<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TourBuddy Live Tracking</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="page-shell app-page-shell">
    <section class="page-intro">
      <div>
        <span class="eyebrow">Screen 02</span>
        <h1>Live Tracking</h1>
        <p>Map-driven safety screen with live position and zone-based warnings.</p>
      </div>
      <a class="back-home" href="/">All Screens</a>
    </section>

    <article class="phone-frame single-phone">
      <div class="phone-top">
        <span class="camera"></span>
        <span class="speaker"></span>
      </div>
      <div class="screen">
        <header class="app-header">
          <a class="back-arrow nav-link" href="/dashboard">&#8592;</a>
          <h2>Live Tracking</h2>
          <span class="menu-icon">&#9776;</span>
        </header>

        <div class="warning-strip">Warning! Entering Unsafe Zone!</div>

        <div class="map-screen">
          <div class="zone green-zone">Safe Zone</div>
          <div class="zone orange-zone">Caution Zone</div>
          <div class="zone red-zone">Unsafe Zone</div>
          <div class="radar-ring ring-1"></div>
          <div class="radar-ring ring-2"></div>
          <div class="radar-ring ring-3"></div>
          <div class="you-pin">
            <span class="pin-dot"></span>
            <span class="pin-label">You</span>
          </div>
          <div class="risk-banner">In Back Gate Area (High Risk)</div>
        </div>

        <nav class="bottom-nav">
          <a href="/dashboard">Home</a>
          <a class="active" href="/tracking">Map</a>
          <a href="/sos">SOS</a>
          <a href="/itinerary">Itinerary</a>
          <a href="/profile">Profile</a>
        </nav>
      </div>
    </article>
  </main>
</body>
</html>
