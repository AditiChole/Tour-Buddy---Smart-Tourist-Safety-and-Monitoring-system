<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TourBuddy Itinerary</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="page-shell app-page-shell">
    <section class="page-intro">
      <div>
        <span class="eyebrow">Screen 04</span>
        <h1>Itinerary</h1>
        <p>Trip overview showing route details, travel dates, and planned stops.</p>
      </div>
      <a class="back-home" href="/">All Screens</a>
    </section>

    <article class="phone-frame single-phone">
      <div class="phone-top">
        <span class="camera"></span>
        <span class="speaker"></span>
      </div>
      <div class="screen">
        <header class="app-header">
          <a class="back-arrow nav-link" href="/sos">&#8592;</a>
          <h2>Itinerary</h2>
          <span class="menu-icon">&#9776;</span>
        </header>

        <div class="screen-body">
          <section class="card itinerary-card">
            <div class="route-lines">
              <p><strong>From:</strong> Nagpur</p>
              <p><strong>To:</strong> Sevagram</p>
              <p><strong>Dates:</strong> May 10 - May 12, 2024</p>
            </div>

            <div class="section-title">Stops</div>
            <ol class="stop-list">
              <li>College</li>
              <li>Market</li>
              <li>Hotel</li>
            </ol>
          </section>
        </div>

        <nav class="bottom-nav">
          <a href="/dashboard">Home</a>
          <a href="/tracking">Map</a>
          <a href="/sos">SOS</a>
          <a class="active" href="/itinerary">Itinerary</a>
          <a href="/profile">Profile</a>
        </nav>
      </div>
    </article>
  </main>
</body>
</html>
