<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TourBuddy SOS</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="page-shell app-page-shell">
    <section class="page-intro">
      <div>
        <span class="eyebrow">Screen 03</span>
        <h1>SOS</h1>
        <p>Emergency alert interface designed for fast action in high-stress moments.</p>
      </div>
      <a class="back-home" href="/">All Screens</a>
    </section>

    <article class="phone-frame single-phone">
      <div class="phone-top">
        <span class="camera"></span>
        <span class="speaker"></span>
      </div>
      <div class="screen">
        <header class="app-header dark-header">
          <a class="back-arrow nav-link light-link" href="/tracking">&#8592;</a>
          <h2>SOS</h2>
          <span class="menu-icon">*</span>
        </header>

        <div class="screen-body sos-body">
          <div class="sos-pulse">
            <div class="sos-ring outer"></div>
            <div class="sos-ring middle"></div>
            <button class="sos-button" type="button">SOS</button>
          </div>
          <p class="sos-text">Send Emergency Alert</p>

          <div class="sos-actions">
            <div class="icon-card">
              <span class="icon red">&#128222;</span>
              <span>Call Police</span>
            </div>
            <div class="icon-card">
              <span class="icon blue">&#10133;</span>
              <span>Notify Volunteers</span>
            </div>
            <div class="icon-card">
              <span class="icon green">&#128205;</span>
              <span>Share Location</span>
            </div>
          </div>
        </div>

        <nav class="bottom-nav alert-nav">
          <a href="/dashboard">Home</a>
          <a href="/tracking">Map</a>
          <a class="active" href="/sos">SOS</a>
          <a href="/itinerary">Itinerary</a>
          <a href="/profile">Profile</a>
        </nav>
      </div>
    </article>
  </main>
</body>
</html>
