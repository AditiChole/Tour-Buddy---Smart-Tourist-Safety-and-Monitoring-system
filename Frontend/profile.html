<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TourBuddy Profile</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="page-shell app-page-shell">
    <section class="page-intro">
      <div>
        <span class="eyebrow">Screen 05</span>
        <h1>Profile</h1>
        <p>Verified tourist identity screen with personal details and trip history.</p>
      </div>
      <a class="back-home" href="/">All Screens</a>
    </section>

    <article class="phone-frame single-phone">
      <div class="phone-top">
        <span class="camera"></span>
        <span class="speaker"></span>
      </div>
      <div class="screen">
        <header class="app-header">
          <a class="back-arrow nav-link" href="/itinerary">&#8592;</a>
          <h2>Profile</h2>
          <span class="menu-icon"></span>
        </header>

        <div class="profile-hero"></div>

        <section class="profile-band">
          <h3>Aditi Sharma</h3>
          <p>aditi.sharma@email.com</p>
        </section>

        <div class="screen-body profile-body">
          <div class="verified-strip">Digital Tourist ID Verified</div>

          <section class="card qr-card">
            <div class="qr-grid" aria-label="QR code visual"></div>
            <p class="qr-id">ID: 0xA84F...32B</p>
          </section>

          <div class="action-row profile-actions">
            <button class="action-button dark" type="button">Personal Details</button>
            <button class="action-button dark" type="button">Trip History</button>
          </div>
        </div>

        <nav class="bottom-nav">
          <a href="/dashboard">Home</a>
          <a href="/tracking">Map</a>
          <a href="/sos">SOS</a>
          <a href="/itinerary">Itinerary</a>
          <a class="active" href="/profile">Profile</a>
        </nav>
      </div>
    </article>
  </main>
</body>
</html>
